<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 {
      font-size: 1rem;
      margin: 0 0 4px;
    }
    p {
      font-size: 0.8rem;
      color: #666;
      margin: 0;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <img src="icon.svg" width="32" height="32" alt="">
  <h1>Bot or Not</h1>
  <p><span class="dot"></span>Active on Reddit</p>
</body>
</html>
