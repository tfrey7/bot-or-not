<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 17em;
      padding: 1em;
      margin: 0;
    }
    .bon-header {
      display: flex;
      align-items: center;
      gap: 0.625em;
      margin-bottom: 0.75em;
    }
    h1 {
      font-size: 1rem;
      margin: 0 0 0.25em;
    }
    .bon-status {
      font-size: 0.8rem;
      color: #666;
      margin: 0;
    }
    .bon-dot {
      display: inline-block;
      width: 0.5em;
      height: 0.5em;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 0.375em;
    }
    #bon-reports-heading {
      font-size: 0.8rem;
      color: #666;
      margin: 0 0 0.5em;
      padding-top: 0.5em;
      border-top: 1px solid #eee;
    }
    #bon-reports-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 20em;
      overflow-y: auto;
      font-size: 0.85rem;
    }
    #bon-reports-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.5em;
      padding: 0.2em 0;
    }
    #bon-reports-list a {
      color: #0366d6;
      text-decoration: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #bon-reports-list a:hover {
      text-decoration: underline;
    }
    .bon-report-count {
      color: #999;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .bon-empty {
      font-size: 0.8rem;
      color: #999;
      margin: 0;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="bon-header">
    <img src="icon.svg" width="32" height="32" alt="">
    <div>
      <h1>Bot or Not</h1>
      <p class="bon-status"><span class="bon-dot"></span>Active on Reddit</p>
    </div>
  </div>
  <h2 id="bon-reports-heading">Reported users</h2>
  <ul id="bon-reports-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
