<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Black background -->
  <rect width="128" height="128" rx="20" fill="#000"/>

  <!-- Antenna stem -->
  <rect x="60" y="18" width="8" height="28" fill="#fff"/>
  <!-- Antenna tip (red) -->
  <circle cx="64" cy="14" r="9" fill="#e00"/>

  <!-- Robot head (white) -->
  <rect x="18" y="42" width="92" height="70" rx="10" fill="#fff"/>

  <!-- Ear bolts -->
  <circle cx="18" cy="77" r="10" fill="#fff"/>
  <circle cx="18" cy="77" r="5"  fill="#000"/>
  <circle cx="110" cy="77" r="10" fill="#fff"/>
  <circle cx="110" cy="77" r="5"  fill="#000"/>

  <!-- Menacing brow cutouts -->
  <polygon points="22,58  56,58  62,46  22,46" fill="#000"/>
  <polygon points="106,58 72,58 66,46 106,46" fill="#000"/>

  <!-- Eyes (red) -->
  <rect x="24" y="58" width="32" height="18" rx="4" fill="#e00"/>
  <rect x="72" y="58" width="32" height="18" rx="4" fill="#e00"/>

  <!-- Mouth grille -->
  <rect x="28" y="86" width="72" height="18" rx="5" fill="#000"/>
  <rect x="32" y="89" width="12" height="12" rx="3" fill="#fff"/>
  <rect x="48" y="89" width="12" height="12" rx="3" fill="#fff"/>
  <rect x="64" y="89" width="12" height="12" rx="3" fill="#fff"/>
  <rect x="80" y="89" width="12" height="12" rx="3" fill="#fff"/>
</svg>
