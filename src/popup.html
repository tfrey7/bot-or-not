<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        width: 25em;
        padding: 1em;
        margin: 0;
      }
      .bon-header {
        display: flex;
        align-items: center;
        gap: 0.625em;
        margin-bottom: 0.75em;
      }
      h1 {
        font-size: 1rem;
        margin: 0 0 0.25em;
      }
      .bon-status {
        font-size: 0.8rem;
        color: #666;
        margin: 0;
      }
      .bon-dot {
        display: inline-block;
        width: 0.5em;
        height: 0.5em;
        border-radius: 50%;
        background: #4caf50;
        margin-right: 0.375em;
      }
      .bon-reports-heading-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5em;
        padding-top: 0.5em;
        margin: 0 0 0.5em;
        border-top: 1px solid #eee;
      }
      #bon-reports-heading {
        font-size: 0.8rem;
        color: #666;
        margin: 0;
      }
      #bon-clear-btn {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: #c0392b;
        font-size: 0.75rem;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      #bon-clear-btn:hover {
        text-decoration: underline;
      }
      #bon-clear-btn[hidden] {
        display: none;
      }
      .bon-heading-actions {
        display: flex;
        align-items: baseline;
        gap: 0.75em;
      }
      #bon-open-full-btn {
        background: none;
        border: none;
        padding: 0;
        cursor: pointer;
        color: #0366d6;
        font-size: 0.75rem;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      #bon-open-full-btn:hover {
        text-decoration: underline;
      }
      .bon-modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1em;
      }
      .bon-modal-backdrop[hidden] {
        display: none;
      }
      .bon-modal {
        background: #fff;
        border-radius: 0.375em;
        padding: 1em;
        box-shadow: 0 0.25em 0.75em rgba(0, 0, 0, 0.2);
        max-width: 100%;
        font-size: 0.85rem;
      }
      .bon-modal p {
        margin: 0 0 0.75em;
      }
      .bon-modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5em;
      }
      .bon-modal-actions button {
        font-size: 0.8rem;
        padding: 0.375em 0.75em;
        border-radius: 0.25em;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      .bon-modal-actions button:hover {
        opacity: 0.85;
      }
      #bon-confirm-clear {
        background: #c0392b;
        border-color: #c0392b;
        color: #fff;
      }
      #bon-reports-list {
        list-style: none;
        padding: 0;
        margin: 0;
        max-height: 30em;
        overflow-y: auto;
        font-size: 0.85rem;
      }
      #bon-reports-list > li {
        padding: 0.25em 0;
        border-bottom: 1px solid #f5f5f5;
      }
      #bon-reports-list > li:last-child {
        border-bottom: none;
      }
      .bon-report-summary {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 3em 1.25em 1.25em 1em;
        gap: 0.5em;
        align-items: baseline;
      }
      .bon-report-summary > :nth-child(n + 2) {
        justify-self: end;
      }
      .bon-investigate-btn {
        appearance: none;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 0;
        line-height: 1;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      .bon-investigate-btn:hover {
        transform: scale(1.15);
        opacity: 0.85;
      }
      .bon-investigate-btn:disabled {
        cursor: progress;
        opacity: 0.5;
      }
      .bon-investigate-btn.bon-spinning {
        width: 0.9em;
        height: 0.9em;
        box-sizing: border-box;
        border: 0.14em solid #cbd5e1;
        border-top-color: #64748b;
        border-radius: 50%;
        vertical-align: middle;
        color: transparent;
        animation: bon-spin 0.8s linear infinite;
      }
      .bon-investigate-btn.bon-spinning:hover {
        transform: none;
        opacity: 1;
      }
      @keyframes bon-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .bon-verdict-badge {
        display: inline-block;
        font-size: 0.6rem;
        font-weight: 600;
        padding: 0.1em 0.4em;
        border-radius: 0.4em;
        color: #fff;
        flex-shrink: 0;
        line-height: 1.3;
        text-transform: lowercase;
        letter-spacing: 0.02em;
        cursor: pointer;
      }
      .bon-verdict-badge--error {
        background: #555;
      }
      #bon-settings-btn {
        background: none;
        border: none;
        padding: 0;
        margin-left: auto;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        color: #999;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      #bon-settings-btn:hover {
        transform: rotate(30deg);
        color: #555;
      }
      .bon-settings-field {
        display: block;
        margin: 0.5em 0;
      }
      .bon-settings-field label {
        display: block;
        font-size: 0.75rem;
        color: #555;
        margin-bottom: 0.25em;
      }
      .bon-settings-field input {
        width: 100%;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        padding: 0.4em 0.5em;
        border: 1px solid #ccc;
        border-radius: 0.25em;
        box-sizing: border-box;
      }
      .bon-settings-status {
        font-size: 0.7rem;
        color: #888;
        margin: 0.25em 0 0;
      }
      .bon-settings-status--set {
        color: #27ae60;
      }
      .bon-settings-status--missing {
        color: #c0392b;
      }
      .bon-check-btn {
        appearance: none;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 0;
        line-height: 1;
        transition:
          opacity 0.15s,
          transform 0.15s;
      }
      .bon-check-btn:hover {
        transform: scale(1.15);
        opacity: 0.85;
      }
      #bon-reports-list a {
        color: #0366d6;
        text-decoration: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #bon-reports-list a:hover {
        text-decoration: underline;
      }
      .bon-username-cell {
        display: inline-flex;
        align-items: baseline;
        gap: 0.3em;
        min-width: 0;
        overflow: hidden;
      }
      .bon-report-date {
        color: #999;
        font-size: 0.7rem;
        white-space: nowrap;
        min-width: 2.5em;
        text-align: right;
      }
      .bon-status-icon,
      .bon-kind-icon {
        font-size: 0.75rem;
        flex-shrink: 0;
        line-height: 1;
      }
      .bon-report-history-meta .bon-status-icon,
      .bon-report-history-meta .bon-kind-icon {
        margin-right: 0.25em;
      }
      .bon-expand-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: #999;
        font-size: 0.7rem;
        padding: 0;
        transition: transform 0.15s;
        line-height: 1;
      }
      .bon-expand-btn[aria-expanded="true"] {
        transform: rotate(90deg);
      }
      .bon-report-history {
        list-style: none;
        padding: 0.25em 0 0.25em 1em;
        margin: 0;
        font-size: 0.75rem;
      }
      .bon-report-history li {
        display: flex;
        gap: 0.5em;
        align-items: baseline;
        padding: 0.1em 0;
      }
      .bon-report-history time {
        color: #999;
        font-size: 0.7rem;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .bon-report-history-meta {
        color: #666;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
        flex: 1;
      }
      .bon-empty {
        font-size: 0.8rem;
        color: #999;
        margin: 0;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="bon-header">
      <img src="../icons/icon.png" width="32" height="32" alt="" />
      <div>
        <h1>Bot or Not</h1>
        <p class="bon-status"><span class="bon-dot"></span>Active on Reddit</p>
      </div>
      <button
        type="button"
        id="bon-settings-btn"
        title="Settings"
        aria-label="Settings"
      >
        ⚙
      </button>
    </div>
    <div class="bon-reports-heading-row">
      <h2 id="bon-reports-heading">Reported users</h2>
      <div class="bon-heading-actions">
        <button type="button" id="bon-open-full-btn">Open full view ↗</button>
        <button type="button" id="bon-clear-btn" hidden>Clear all</button>
      </div>
    </div>
    <ul id="bon-reports-list"></ul>
    <div id="bon-settings-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-settings-heading"
      >
        <p id="bon-settings-heading"><strong>Settings</strong></p>
        <div class="bon-settings-field">
          <label for="bon-api-key-input">Claude API key</label>
          <input
            type="password"
            id="bon-api-key-input"
            placeholder="sk-ant-..."
            autocomplete="off"
            spellcheck="false"
          />
          <p id="bon-api-key-status" class="bon-settings-status"></p>
        </div>
        <div class="bon-modal-actions">
          <button type="button" id="bon-settings-cancel">Close</button>
          <button type="button" id="bon-settings-save">Save</button>
        </div>
      </div>
    </div>
    <div id="bon-confirm-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-modal-text"
      >
        <p id="bon-modal-text">
          Clear all reported users? This can't be undone.
        </p>
        <div class="bon-modal-actions">
          <button type="button" id="bon-cancel-clear">Cancel</button>
          <button type="button" id="bon-confirm-clear">Clear all</button>
        </div>
      </div>
    </div>
    <script src="verdict.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
