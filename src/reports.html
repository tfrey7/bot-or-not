<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bot or Not — Reports</title>
    <link rel="icon" type="image/png" href="../icons/icon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reports.css" />
    <link rel="stylesheet" href="triangle/triangle.css" />
    <!--
      triangle.css stays loaded so the .bon-beta-tag pill in the header link
      keeps its styling. The triangle widget itself isn't used on this page.
    -->
    <link rel="stylesheet" href="analytics.css" />
  </head>
  <body>
    <div class="bon-page">
      <header class="bon-header">
        <img src="../icons/icon.png" width="44" height="44" alt="" />
        <div class="bon-header-titles">
          <h1>Bot <em>or</em> Not</h1>
          <p class="bon-subtitle">Reports · Accounts you've flagged</p>
        </div>
        <div class="bon-header-actions">
          <a href="reports_triangle.html" class="bon-btn">
            Triangle view <span class="bon-beta-tag">BETA</span>
          </a>
          <button type="button" id="bon-refresh-btn" class="bon-btn">
            ↻ Refresh
          </button>
          <button
            type="button"
            id="bon-settings-btn"
            class="bon-btn"
            aria-label="Settings"
            title="Settings"
          >
            ⚙ Settings
          </button>
          <button
            type="button"
            id="bon-clear-btn"
            class="bon-btn bon-btn--danger"
            hidden
          >
            Clear all
          </button>
        </div>
      </header>

      <div class="bon-toolbar">
        <input
          type="search"
          id="bon-search"
          class="bon-search"
          placeholder="Search username, subreddit, or post title…"
          autocomplete="off"
        />
      </div>

      <div class="bon-table-wrap" id="bon-table-wrap">
        <table class="bon-table" id="bon-table">
          <thead>
            <tr>
              <th style="width: 2em"></th>
              <th class="bon-sortable" data-sort="username">
                User <span class="bon-sort-indicator"></span>
              </th>
              <th class="bon-sortable" data-sort="region">
                Region <span class="bon-sort-indicator"></span>
              </th>
              <th class="bon-sortable" data-sort="verdict">
                AI verdict <span class="bon-sort-indicator"></span>
              </th>
              <th>Factors</th>
              <th
                class="bon-sortable"
                data-sort="investigatedAt"
                data-default-dir="desc"
              >
                Investigated <span class="bon-sort-indicator"></span>
              </th>
              <th
                class="bon-sortable"
                data-sort="lastReportedAt"
                data-default-dir="desc"
              >
                Last reported <span class="bon-sort-indicator">▼</span>
              </th>
              <th style="width: 5em"></th>
            </tr>
          </thead>
          <tbody id="bon-tbody"></tbody>
        </table>
      </div>

      <div id="bon-empty" class="bon-empty" hidden>
        No reports yet. Flag a Reddit user from their profile page to start
        tracking.
      </div>

      <div id="bon-analytics-container"></div>
    </div>

    <div id="bon-settings-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-settings-heading"
      >
        <p id="bon-settings-heading">
          <strong>Settings</strong>
        </p>
        <div class="bon-settings-field">
          <label for="bon-api-key-input">Claude API key</label>
          <input
            type="password"
            id="bon-api-key-input"
            placeholder="sk-ant-..."
            autocomplete="off"
            spellcheck="false"
          />
          <p id="bon-api-key-status" class="bon-settings-status"></p>
        </div>
        <div class="bon-modal-actions">
          <button type="button" id="bon-settings-cancel" class="bon-btn">
            Close
          </button>
          <button type="button" id="bon-settings-save" class="bon-btn">
            Save
          </button>
        </div>
      </div>
    </div>

    <div id="bon-confirm-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-modal-text"
      >
        <p id="bon-modal-text">
          Clear all reported users? This can't be undone.
        </p>
        <div class="bon-modal-actions">
          <button type="button" id="bon-cancel-clear" class="bon-btn">
            Cancel
          </button>
          <button
            type="button"
            id="bon-confirm-clear"
            class="bon-btn bon-btn--danger"
          >
            Clear all
          </button>
        </div>
      </div>
    </div>

    <script src="verdict.js"></script>
    <script src="config.js"></script>
    <script src="factors.js"></script>
    <script src="regions.js"></script>
    <script src="analytics.js"></script>
    <script src="reports.js"></script>
  </body>
</html>
