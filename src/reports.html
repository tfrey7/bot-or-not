<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bot or Not — Reports</title>
    <link rel="icon" type="image/png" href="../icons/icon-32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reports.css" />
    <link rel="stylesheet" href="features/analytics/styles.css" />
    <link rel="stylesheet" href="features/diagnostics/styles.css" />
  </head>
  <body>
    <div class="bon-page">
      <header class="bon-header">
        <img
          src="../icons/chromes.png"
          width="56"
          height="80"
          alt="Sherlock Chromes"
          class="bon-header-mascot"
        />
        <div class="bon-header-titles">
          <h1>Bot <em>or</em> Not</h1>
        </div>
        <div class="bon-header-actions">
          <button
            type="button"
            id="bon-settings-btn"
            class="bon-btn"
            aria-label="Settings"
            title="Settings"
          >
            ⚙ Settings
          </button>
        </div>
      </header>

      <nav class="bon-tabs" role="tablist" aria-label="Page sections">
        <button
          type="button"
          class="bon-tab bon-tab--active"
          role="tab"
          aria-selected="true"
          aria-controls="bon-panel-reports"
          id="bon-tab-reports"
          data-tab="reports"
        >
          Reports
        </button>
        <button
          type="button"
          class="bon-tab"
          role="tab"
          aria-selected="false"
          aria-controls="bon-panel-metrics"
          id="bon-tab-metrics"
          data-tab="metrics"
        >
          Metrics
        </button>
        <button
          type="button"
          class="bon-tab"
          role="tab"
          aria-selected="false"
          aria-controls="bon-panel-diagnostics"
          id="bon-tab-diagnostics"
          data-tab="diagnostics"
        >
          Diagnostics
        </button>
      </nav>

      <section
        class="bon-tab-panel"
        role="tabpanel"
        id="bon-panel-reports"
        aria-labelledby="bon-tab-reports"
      >
        <div class="bon-toolbar">
          <input
            type="search"
            id="bon-search"
            class="bon-search"
            placeholder="Search username, subreddit, or post title…"
            autocomplete="off"
          />
          <span class="bon-ring-status" id="bon-ring-status" hidden></span>
          <button
            type="button"
            id="bon-ring-link-btn"
            class="bon-btn"
            hidden
            disabled
          >
            Link as ring
          </button>
          <button
            type="button"
            id="bon-ring-unlink-btn"
            class="bon-btn"
            hidden
            disabled
          >
            Unlink
          </button>
          <button type="button" id="bon-ring-mode-btn" class="bon-btn">
            Link rings
          </button>
        </div>

        <div class="bon-split" id="bon-split">
          <div class="bon-split-list">
            <div class="bon-table-wrap" id="bon-table-wrap">
              <table class="bon-table" id="bon-table">
                <thead>
                  <tr>
                    <th class="bon-row-select-cell" aria-label="Select"></th>
                    <th class="bon-sortable" data-sort="username">
                      User <span class="bon-sort-indicator"></span>
                    </th>
                    <th class="bon-sortable" data-sort="region">
                      Region <span class="bon-sort-indicator"></span>
                    </th>
                    <th class="bon-sortable" data-sort="verdict">
                      AI verdict <span class="bon-sort-indicator"></span>
                    </th>
                    <th
                      class="bon-sortable"
                      data-sort="investigatedAt"
                      data-default-dir="desc"
                    >
                      Investigated <span class="bon-sort-indicator"></span>
                    </th>
                  </tr>
                </thead>
                <tbody id="bon-tbody"></tbody>
              </table>
            </div>

            <div id="bon-pagination-container"></div>

            <div id="bon-empty" class="bon-empty" hidden>
              No reports yet. Flag a Reddit user from their profile page to
              start tracking.
            </div>
          </div>

          <aside
            class="bon-split-detail"
            id="bon-detail-pane"
            aria-live="polite"
          ></aside>
        </div>
      </section>

      <section
        class="bon-tab-panel"
        role="tabpanel"
        id="bon-panel-metrics"
        aria-labelledby="bon-tab-metrics"
        hidden
      >
        <div id="bon-analytics-container"></div>
      </section>

      <section
        class="bon-tab-panel"
        role="tabpanel"
        id="bon-panel-diagnostics"
        aria-labelledby="bon-tab-diagnostics"
        hidden
      >
        <div id="bon-diagnostics-container"></div>
      </section>

      <footer class="bon-footer">
        Bot or Not v<span id="bon-version"></span>
      </footer>
    </div>

    <div id="bon-settings-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-settings-heading"
      >
        <p id="bon-settings-heading">
          <strong>Settings</strong>
        </p>
        <div class="bon-settings-field">
          <label for="bon-api-key-input">Claude API key</label>
          <input
            type="password"
            id="bon-api-key-input"
            placeholder="sk-ant-..."
            autocomplete="off"
            spellcheck="false"
          />
          <p id="bon-api-key-status" class="bon-settings-status"></p>
        </div>
        <div class="bon-settings-danger">
          <p class="bon-settings-danger-label">Danger zone</p>
          <div class="bon-settings-danger-row">
            <span class="bon-settings-danger-desc">
              Delete every reported user and investigation.
            </span>
            <button
              type="button"
              id="bon-clear-btn"
              class="bon-btn bon-btn--danger"
            >
              Clear all
            </button>
          </div>
        </div>
        <div class="bon-modal-actions">
          <button type="button" id="bon-settings-cancel" class="bon-btn">
            Close
          </button>
          <button type="button" id="bon-settings-save" class="bon-btn">
            Save
          </button>
        </div>
      </div>
    </div>

    <div id="bon-confirm-modal" class="bon-modal-backdrop" hidden>
      <div
        class="bon-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="bon-modal-text"
      >
        <p id="bon-modal-text">
          Clear all reported users? This can't be undone.
        </p>
        <div class="bon-modal-actions">
          <button type="button" id="bon-cancel-clear" class="bon-btn">
            Cancel
          </button>
          <button
            type="button"
            id="bon-confirm-clear"
            class="bon-btn bon-btn--danger"
          >
            Clear all
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="features/reports/index.ts"></script>
  </body>
</html>
